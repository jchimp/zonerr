services:
  dns-manager:
    build: .
    container_name: dns-manager
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - BIND_ZONE_DIR=/etc/bind/zones
      - BIND_NAMED_CONF_LOCAL=/etc/bind/named.conf.local
      - BIND_LOG_DIR=/var/log/bind
      - RNDC_HOST=bind
      - RNDC_PORT=953
    volumes:
      - bind-zones:/etc/bind/zones
      - bind-config:/etc/bind
      - bind-logs:/var/log/bind
      - app-data:/data
    depends_on:
      bind:
        condition: service_started
    entrypoint: /bin/bash
    command: >
      -c "
      if [ ! -f /etc/bind/named.conf ]; then
        cp /app/bind-config/named.conf /etc/bind/named.conf;
      fi;
      exec gunicorn -w 2 -b 0.0.0.0:5000 run:app
      "

  bind:
    image: ubuntu/bind9:latest
    container_name: dns-bind
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - bind-zones:/etc/bind/zones
      - bind-config:/etc/bind
      - bind-logs:/var/log/bind
      - ./bind-config/rndc-controls.conf:/etc/bind/rndc-controls.conf:ro
      - ./bind-config/logging.conf:/etc/bind/logging.conf:ro
    environment:
      - BIND9_USER=bind
      - TZ=UTC
    entrypoint: /bin/bash
    command: >
      -c "
      if [ ! -f /etc/bind/rndc.key ]; then
        rndc-confgen -a -b 256 -k rndc-key;
        chmod 640 /etc/bind/rndc.key;
        chown root:bind /etc/bind/rndc.key;
      fi;
      if ! grep -q 'rndc-controls' /etc/bind/named.conf; then
        echo 'include \"/etc/bind/rndc-controls.conf\";' >> /etc/bind/named.conf;
      fi;
      if ! grep -q 'logging.conf' /etc/bind/named.conf; then
        echo 'include \"/etc/bind/logging.conf\";' >> /etc/bind/named.conf;
      fi;
      if [ ! -f /etc/bind/named.conf.local ]; then
        echo '// Managed by DNS Manager' > /etc/bind/named.conf.local;
      fi;
      mkdir -p /etc/bind/zones /var/log/bind;
      chown -R bind:bind /etc/bind/zones /var/log/bind;
      exec named -g -u bind
      "

volumes:
  bind-zones:
  bind-config:
  bind-logs:
  app-data: