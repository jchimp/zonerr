{% extends "base.html" %}
{% block title %}BIND Status — Zonerr{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3">
    <h5 class="mb-0 fw-bold"><i class="bi bi-activity me-2"></i>BIND Status</h5>
</div>

<div class="card border-0 mb-3">
    <div class="card-header py-2 px-3">
        <h6 class="mb-0 fw-semibold"><i class="bi bi-gear me-2"></i>Actions</h6>
    </div>
    <div class="card-body p-3">
        <div class="d-flex flex-wrap gap-2">
            <form method="POST" action="{{ url_for('settings.bind_action') }}" class="d-inline">
                <input type="hidden" name="action" value="reload">
                <button type="submit" class="btn btn-sm btn-primary">
                    <i class="bi bi-arrow-clockwise me-1"></i>Reload
                </button>
            </form>
            <form method="POST" action="{{ url_for('settings.bind_action') }}" class="d-inline">
                <input type="hidden" name="action" value="reconfig">
                <button type="submit" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-wrench me-1"></i>Reconfig
                </button>
            </form>
            <form method="POST" action="{{ url_for('settings.bind_action') }}" class="d-inline">
                <input type="hidden" name="action" value="flush">
                <button type="submit" class="btn btn-sm btn-outline-warning">
                    <i class="bi bi-trash3 me-1"></i>Flush Cache
                </button>
            </form>
            <form method="POST" action="{{ url_for('settings.bind_action') }}" class="d-inline"
                  onsubmit="return confirm('BIND will briefly go offline while Docker restarts it.\n\nContinue?')">
                <input type="hidden" name="action" value="restart">
                <button type="submit" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-bootstrap-reboot me-1"></i>Restart
                </button>
            </form>
        </div>
        <div class="mt-2 small text-muted">
            <strong>Reload</strong> — reload zones + config &nbsp;|&nbsp;
            <strong>Reconfig</strong> — reload named.conf only &nbsp;|&nbsp;
            <strong>Flush</strong> — clear DNS cache &nbsp;|&nbsp;
            <strong>Restart</strong> — stop BIND, Docker restarts it
        </div>
    </div>
</div>

<div class="card border-0">
    <div class="card-header py-2 px-3 d-flex align-items-center justify-content-between">
        <h6 class="mb-0 fw-semibold"><i class="bi bi-terminal me-2"></i>rndc status</h6>
    </div>
    <div class="card-body p-3">
        <pre class="mb-0 small font-monospace status-output">{{ status }}</pre>
    </div>
</div>
{% endblock %}
