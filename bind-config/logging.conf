logging {
    channel default_log {
        file "/var/log/bind/default.log" versions 5 size 10m;
        severity info;
        print-time yes;
        print-severity yes;
        print-category yes;
    };
    channel query_log {
        file "/var/log/bind/query.log" versions 5 size 10m;
        severity debug;
        print-time yes;
    };
    category default { default_log; };
    category queries { query_log; };
    category security { default_log; };
    category xfer-in { default_log; };
    category xfer-out { default_log; };
    category notify { default_log; };
};
