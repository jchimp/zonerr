services:
  dns-manager:
    build: .
    container_name: dns-manager
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - BIND_ZONE_DIR=/etc/bind/zones
      - BIND_NAMED_CONF_LOCAL=/etc/bind/named.conf.local
      - RNDC_HOST=host.docker.internal
      - RNDC_PORT=953
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /etc/bind/zones:/etc/bind/zones
      - /etc/bind/named.conf.local:/etc/bind/named.conf.local
      - dns-manager-data:/data

volumes:
  dns-manager-data:
  